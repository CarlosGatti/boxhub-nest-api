server {
    listen 443 ssl http2;
    server_name discart.me www.discart.me;

    ssl_certificate /etc/letsencrypt/live/discart.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/discart.me/privkey.pem;

    # Origins allowed to call this API from the browser (GraphQL + uploads).
    # Add new frontend hosts here when deploying another Vercel/app domain.
    set $cors_origin "";
    if ($http_origin ~* ^(https://request-academy\.vercel\.app|https://([a-z0-9-]+\.)?defined-lab\.com|http://localhost(:[0-9]+)?)$) {
        set $cors_origin $http_origin;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /graphql {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,X-App,X-App-Code,X-App-Name" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_pass http://127.0.0.1:3000/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,X-App,X-App-Code,X-App-Name" always;
    }

    # Defined Academy REST uploads (multipart). Same CORS needs as GraphQL.
    location /academy/upload {
        client_max_body_size 10m;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,X-App,X-App-Code,X-App-Name" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,X-App,X-App-Code,X-App-Name" always;
    }
}
